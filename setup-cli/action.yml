name: 'Setup gh-aw CLI'
description: 'Install gh-aw CLI extension for a specific version'
author: 'GitHub Next'

inputs:
  version:
    description: 'Version to install (release tag like v0.37.18)'
    required: true
  github-token:
    description: 'GitHub token for authentication (used for gh CLI and API calls)'
    required: false
    default: ${{ github.token }}

outputs:
  installed-version:
    description: 'The version that was installed'
    value: ${{ steps.install-windows.outputs.installed_version || steps.install-unix.outputs.installed_version }}
  
runs:
  using: 'composite'
  steps:
    - name: Install gh-aw CLI (PowerShell)
      id: install-windows
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.github-token }}
        ACTION_PATH: ${{ github.action_path }}
      run: '& "$env:ACTION_PATH/install.ps1"'

    - name: Install gh-aw CLI (Bash)
      id: install-unix
      if: runner.os != 'Windows'
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.github-token }}
        ACTION_PATH: ${{ github.action_path }}
      run: "$ACTION_PATH/install.sh"

branding:
  icon: 'download'
  color: 'purple'
